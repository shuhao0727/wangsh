x-common-env: &common-env
  DEPLOYMENT_ENV: "production"
  REACT_APP_ENV: "production"
  DEBUG: "False"
  AUTO_CREATE_TABLES: "false"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TIMEZONE: ${TIMEZONE:-Asia/Shanghai}
  TZ: ${TIMEZONE:-Asia/Shanghai}
  APP_VERSION: ${APP_VERSION:-}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  AGENT_API_KEY_ENCRYPTION_KEY: ${AGENT_API_KEY_ENCRYPTION_KEY:-}
  AI_AGENT_MAX_OUTPUT_TOKENS: ${AI_AGENT_MAX_OUTPUT_TOKENS:-8192}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-wangsh_db}
  POSTGRES_USER: ${POSTGRES_USER:-admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-admin}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD is required}
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  ALL_PROXY: ""
  NO_PROXY: "localhost,127.0.0.1,postgres,redis,backend"

# 包含 common-env + PythonLab 环境变量的合并版本
x-common-with-pythonlab-env: &common-with-pythonlab-env
  <<: *common-env
  PYTHONLAB_SANDBOX_IMAGE: ${PYTHONLAB_SANDBOX_IMAGE:-shuhao07/pythonlab-sandbox:${IMAGE_TAG:-1.6.0}}
  PYTHONLAB_SANDBOX_PROVIDER: ${PYTHONLAB_SANDBOX_PROVIDER:-docker}
  PYTHONLAB_DOCKER_RUNTIME: ${PYTHONLAB_DOCKER_RUNTIME:-runc}
  PYTHONLAB_CONTAINER_NAMESPACE: ${PYTHONLAB_CONTAINER_NAMESPACE:-pythonlab}
  PYTHONLAB_WORKSPACE_ROOT: ${PYTHONLAB_WORKSPACE_ROOT:-/tmp/pythonlab/workspaces}
  PYTHONLAB_HOST_WORKSPACE_ROOT: ${PYTHONLAB_HOST_WORKSPACE_ROOT:-./data/pythonlab/workspaces}
  PYTHONLAB_SESSION_TTL_SECONDS: ${PYTHONLAB_SESSION_TTL_SECONDS:-3600}
  PYTHONLAB_UNATTACHED_TTL_SECONDS: ${PYTHONLAB_UNATTACHED_TTL_SECONDS:-600}
  PYTHONLAB_MAX_SESSIONS_PER_USER: ${PYTHONLAB_MAX_SESSIONS_PER_USER:-5}
  PYTHONLAB_DEBUGPY_PORT: ${PYTHONLAB_DEBUGPY_PORT:-5678}
  PYTHONLAB_READINESS_TIMEOUT_SECONDS: ${PYTHONLAB_READINESS_TIMEOUT_SECONDS:-30}
  PYTHONLAB_DEFAULT_CPU_QUOTA: ${PYTHONLAB_DEFAULT_CPU_QUOTA:-50000}
  PYTHONLAB_DEFAULT_MEMORY_MB: ${PYTHONLAB_DEFAULT_MEMORY_MB:-128}
  PYTHONLAB_WORKSPACE_DISK_QUOTA_MB: ${PYTHONLAB_WORKSPACE_DISK_QUOTA_MB:-512}
  PYTHONLAB_CONTAINER_PIDS_LIMIT: ${PYTHONLAB_CONTAINER_PIDS_LIMIT:-128}
  PYTHONLAB_LOG_MAX_SIZE: ${PYTHONLAB_LOG_MAX_SIZE:-10m}
  PYTHONLAB_LOG_MAX_FILE: ${PYTHONLAB_LOG_MAX_FILE:-3}
  PYTHONLAB_ORPHAN_CLEANUP_ENABLED: ${PYTHONLAB_ORPHAN_CLEANUP_ENABLED:-true}
  PYTHONLAB_ORPHAN_CLEANUP_INTERVAL_SECONDS: ${PYTHONLAB_ORPHAN_CLEANUP_INTERVAL_SECONDS:-300}
  PYTHONLAB_HEARTBEAT_TIMEOUT_SECONDS: ${PYTHONLAB_HEARTBEAT_TIMEOUT_SECONDS:-180}
  PYTHONLAB_IDLE_TIMEOUT_SECONDS: ${PYTHONLAB_IDLE_TIMEOUT_SECONDS:-3600}
  HOST_WORKSPACE_ROOT: "${HOST_WORKSPACE_ROOT:-}"

x-depends-infra: &depends-infra
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wangsh_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TIMEZONE:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - wangsh-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - wangsh-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: backend_runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
    image: ${IMAGE_REPOSITORY_PREFIX:-shuhao07}/wangsh-backend:${IMAGE_TAG:-1.6.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      <<: *common-with-pythonlab-env
      # SSE pub/sub 已支持 Redis 模式（多 worker 安全）
      # 如需禁用 Redis pub/sub 回退到进程内模式，设置 SSE_REDIS_PUBSUB_ENABLED=false
      SSE_REDIS_PUBSUB_ENABLED: ${SSE_REDIS_PUBSUB_ENABLED:-true}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      AUTH_TRUST_X_FORWARDED_FOR: ${AUTH_TRUST_X_FORWARDED_FOR:-true}
      AUTH_IP_HEADER_ORDER: ${AUTH_IP_HEADER_ORDER:-X-Forwarded-For,X-Real-IP,Forwarded,Remote-Addr}
      AUTH_USER_UNIQUE_PER_IP: ${AUTH_USER_UNIQUE_PER_IP:-false}
      AUTH_IP_UNIQUE_PER_USER: ${AUTH_IP_UNIQUE_PER_USER:-false}
      AUTH_ENFORCE_SAME_IP_PER_REQUEST: ${AUTH_ENFORCE_SAME_IP_PER_REQUEST:-false}
      AUTH_SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-0}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TYPST_COMPILE_MAX_CONCURRENCY: ${TYPST_COMPILE_MAX_CONCURRENCY:-2}
      TYPST_COMPILE_USE_CELERY: "true"
      TYPST_PDF_STORAGE_DIR: "/app/data/typst_pdfs"
      TYPST_STORE_PDF_IN_DB: "false"
    depends_on:
      <<: *depends-infra
    healthcheck:
      test: [ "CMD-SHELL", "for i in $(seq 1 30); do python -c \"import atexit,http.client,json,sys; JSONObject=type('JSONObject',(list,),{}); c=http.client.HTTPConnection('127.0.0.1',8000,timeout=2); atexit.register(c.close); c.request('GET','/health'); r=c.getresponse(); payload=json.loads(r.read(),object_pairs_hook=JSONObject); statuses=[value for key,value in payload if key == 'status'] if isinstance(payload,JSONObject) else []; sys.exit(0 if 200 <= r.status < 300 and len(statuses) == 1 and statuses[0] == 'healthy' else 1)\" && exit 0; sleep 1; done; exit 1" ]
      interval: 10s
      timeout: 25s
      retries: 20
    networks:
      - wangsh-network
      - dify_network  # 可选：仅在部署了 Dify 时需要；未部署时删除此行和底部 dify_network 定义
    # 生产启动顺序：
    # 1. 只读检查迁移状态，提前阻断 alembic_version 与真实 schema 漂移
    # 2. 空库仅补 Alembic 历史之前的 legacy 基线表，不 stamp
    # 3. 空库和已有库都通过正式 Alembic 迁移到唯一 head
    # 4. 创建兼容视图/极少量历史兼容补丁
    command: [ "sh", "-c", "python /app/scripts/check_migration_state.py && python /app/scripts/bootstrap_db.py --initial-only && alembic -c /app/alembic.ini upgrade head && python /app/scripts/bootstrap_db.py && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1}" ]
    volumes:
      - typst_pdfs:/app/data/typst_pdfs
      - uploads_data:/app/uploads
      # ⚠️ 安全提醒：/var/run/docker.sock 赋予容器操控宿主机 Docker 的能力（等同于 root）。
      # PythonLab 沙箱需要动态创建调试容器，因此必须挂载。
      # 缓解措施：
      #   1. 生产环境建议使用独立的 Docker-in-Docker (dind) 服务替代直接挂载 socket
      #   2. 或在 Kubernetes 中使用 Pod API，避免暴露 Docker socket
      #   3. 至少确保 backend 容器不暴露到公网，且代码中无命令注入漏洞
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PYTHONLAB_HOST_WORKSPACE_ROOT:-./data/pythonlab/workspaces}:${PYTHONLAB_WORKSPACE_ROOT:-/tmp/pythonlab/workspaces}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    group_add:
      # 允许非 root 的 appuser 访问宿主机 Docker socket，用于 PythonLab 终端附着。
      # Docker Desktop/部分部署环境会把 socket 映射为 root:root(0)，生产 Linux
      # 常见为 root:docker(例如 984/999)，所以同时加入 0 和可覆盖的宿主 GID。
      - "0"
      - "${DOCKER_SOCK_GID:-984}"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '2.0'

  typst-worker:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: worker_runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
    image: ${IMAGE_REPOSITORY_PREFIX:-shuhao07}/wangsh-typst-worker:${IMAGE_TAG:-1.6.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      <<: *depends-infra
      backend:
        condition: service_healthy
    environment:
      <<: *common-env
      PYTHONPATH: "/app"
      TYPST_COMPILE_MAX_CONCURRENCY: ${TYPST_COMPILE_MAX_CONCURRENCY:-2}
      TYPST_COMPILE_USE_CELERY: "true"
      TYPST_PDF_STORAGE_DIR: "/app/data/typst_pdfs"
      TYPST_STORE_PDF_IN_DB: "false"
    command: [ "sh", "-c", "celery -A app.celery_app:celery worker -l INFO -Q typst -c ${TYPST_WORKER_CONCURRENCY:-1}" ]
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.celery_app:celery inspect ping -d celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wangsh-network
    volumes:
      - typst_pdfs:/app/data/typst_pdfs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # 默认 celery 队列 worker：处理 PythonLab 任务和课堂结束后的 AI 分析。
  pythonlab-worker:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: pythonlab_worker_runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-https://mirrors.aliyun.com/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}
    image: ${IMAGE_REPOSITORY_PREFIX:-shuhao07}/wangsh-pythonlab-worker:${IMAGE_TAG:-1.6.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      <<: *depends-infra
      backend:
        condition: service_healthy
    environment:
      <<: *common-with-pythonlab-env
      PYTHONPATH: "/app"
    user: "0:0"
    command: [ "sh", "-c", "celery -A app.celery_app:celery worker -l INFO -Q celery -c ${PYTHONLAB_WORKER_CONCURRENCY:-3} --include app.tasks.pythonlab" ]
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.celery_app:celery inspect ping -d celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wangsh-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # PythonLab 沙箱容器管理所需，安全风险见 backend 注释
      - ${PYTHONLAB_HOST_WORKSPACE_ROOT:-./data/pythonlab/workspaces}:${PYTHONLAB_WORKSPACE_ROOT:-/tmp/pythonlab/workspaces}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  pythonlab-sandbox:
    platform: linux/amd64
    build:
      context: ./backend/docker/pythonlab-sandbox
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: ${PYTHONLAB_SANDBOX_IMAGE:-shuhao07/pythonlab-sandbox:${IMAGE_TAG:-1.6.0}}
    restart: unless-stopped
    command: [ "sh", "-lc", "sleep infinity" ]
    networks:
      - wangsh-network
    deploy:
      resources:
        limits:
          # 该占位服务仅用于镜像构建/预拉取；真实调试会话的资源限制由 backend 动态创建时决定。
          memory: 128M

  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_VERSION: ${REACT_APP_VERSION:-}
        NODE_IMAGE: ${NODE_IMAGE:-public.ecr.aws/docker/library/node:20-alpine}
        CADDY_IMAGE: ${CADDY_IMAGE:-public.ecr.aws/docker/library/caddy:2-alpine}
    image: ${IMAGE_REPOSITORY_PREFIX:-shuhao07}/wangsh-frontend:${IMAGE_TAG:-1.6.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,backend"
    networks:
      - wangsh-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  gateway:
    platform: linux/amd64
    build:
      context: ./gateway
      args:
        CADDY_IMAGE: ${GATEWAY_CADDY_IMAGE:-public.ecr.aws/docker/library/caddy:2.8.4}
    image: ${IMAGE_REPOSITORY_PREFIX:-shuhao07}/wangsh-gateway:${IMAGE_TAG:-1.6.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${WEB_PORT:-6608}:80"
    environment:
      TZ: ${TIMEZONE:-Asia/Shanghai}
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,backend,frontend"
    depends_on:
      - frontend
      - backend
    networks:
      - wangsh-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  wangsh-network:
    driver: bridge
  # 可选：Dify 外部网络，未部署 Dify 时删除此块和 backend 中的 dify_network 引用
  dify_network:
    external: true
    name: docker_default

volumes:
  postgres_data:
  redis_data:
  typst_pdfs:
  uploads_data:
