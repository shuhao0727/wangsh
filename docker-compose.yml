x-common-env: &common-env
  DEPLOYMENT_ENV: "production"
  REACT_APP_ENV: "production"
  DEBUG: "False"
  AUTO_CREATE_TABLES: "false"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TIMEZONE:-Asia/Shanghai}
  APP_VERSION: ${APP_VERSION:-}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  AGENT_API_KEY_ENCRYPTION_KEY: ${AGENT_API_KEY_ENCRYPTION_KEY:-}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-wangsh_db}
  POSTGRES_USER: ${POSTGRES_USER:-admin}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  REDIS_HOST: wangsh-redis
  REDIS_PORT: "6379"
  SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-admin}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?SUPER_ADMIN_PASSWORD is required}
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  ALL_PROXY: ""
  NO_PROXY: "localhost,127.0.0.1,postgres,redis,wangsh-redis,backend"

# 包含 common-env + PythonLab 环境变量的合并版本
x-common-with-pythonlab-env: &common-with-pythonlab-env
  <<: *common-env
  PYTHONLAB_SANDBOX_IMAGE: ${PYTHONLAB_SANDBOX_IMAGE:-shuhao07/pythonlab-sandbox:py311}
  PYTHONLAB_WORKSPACE_ROOT: ${PYTHONLAB_WORKSPACE_ROOT:-/tmp/pythonlab/workspaces}
  PYTHONLAB_SESSION_TTL_SECONDS: ${PYTHONLAB_SESSION_TTL_SECONDS:-3600}
  PYTHONLAB_UNATTACHED_TTL_SECONDS: ${PYTHONLAB_UNATTACHED_TTL_SECONDS:-600}
  PYTHONLAB_MAX_SESSIONS_PER_USER: ${PYTHONLAB_MAX_SESSIONS_PER_USER:-5}
  PYTHONLAB_DEBUGPY_PORT: ${PYTHONLAB_DEBUGPY_PORT:-5678}
  PYTHONLAB_READINESS_TIMEOUT_SECONDS: ${PYTHONLAB_READINESS_TIMEOUT_SECONDS:-30}
  PYTHONLAB_DEFAULT_MEMORY_MB: "32"
  PYTHONLAB_ORPHAN_CLEANUP_ENABLED: ${PYTHONLAB_ORPHAN_CLEANUP_ENABLED:-true}
  PYTHONLAB_ORPHAN_CLEANUP_INTERVAL_SECONDS: ${PYTHONLAB_ORPHAN_CLEANUP_INTERVAL_SECONDS:-300}
  PYTHONLAB_HEARTBEAT_TIMEOUT_SECONDS: ${PYTHONLAB_HEARTBEAT_TIMEOUT_SECONDS:-180}
  PYTHONLAB_IDLE_TIMEOUT_SECONDS: ${PYTHONLAB_IDLE_TIMEOUT_SECONDS:-3600}
  HOST_WORKSPACE_ROOT: ${PWD}/data/pythonlab/workspaces

x-depends-infra: &depends-infra
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wangsh_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TIMEZONE:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - wangsh-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: wangsh-redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - wangsh-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: backend_runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKERHUB_NAMESPACE:-shuhao07}/wangsh-backend:${IMAGE_TAG:-1.4.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      <<: *common-with-pythonlab-env
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      AUTH_TRUST_X_FORWARDED_FOR: ${AUTH_TRUST_X_FORWARDED_FOR:-true}
      AUTH_IP_HEADER_ORDER: ${AUTH_IP_HEADER_ORDER:-X-Forwarded-For,X-Real-IP,Forwarded,Remote-Addr}
      AUTH_USER_UNIQUE_PER_IP: ${AUTH_USER_UNIQUE_PER_IP:-false}
      AUTH_IP_UNIQUE_PER_USER: ${AUTH_IP_UNIQUE_PER_USER:-false}
      AUTH_ENFORCE_SAME_IP_PER_REQUEST: ${AUTH_ENFORCE_SAME_IP_PER_REQUEST:-false}
      AUTH_SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-0}
      TYPST_COMPILE_MAX_CONCURRENCY: ${TYPST_COMPILE_MAX_CONCURRENCY:-2}
      TYPST_COMPILE_USE_CELERY: "true"
      TYPST_PDF_STORAGE_DIR: "/app/data/typst_pdfs"
      TYPST_STORE_PDF_IN_DB: "false"
    depends_on:
      <<: *depends-infra
    healthcheck:
      test: [ "CMD-SHELL", "for i in $(seq 1 30); do python -c \"import http.client; c=http.client.HTTPConnection('127.0.0.1',8000,timeout=2); c.request('GET','/health'); r=c.getresponse(); r.read(); print('ok')\" && exit 0; sleep 1; done; exit 1" ]
      interval: 10s
      timeout: 25s
      retries: 20
    networks:
      - wangsh-network
      - dify_network
    command: [ "sh", "-c", "python /app/scripts/bootstrap_db.py && alembic -c /app/alembic.ini upgrade head && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1}" ]
    volumes:
      - typst_pdfs:/app/data/typst_pdfs
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/pythonlab/workspaces:/tmp/pythonlab/workspaces
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '2.0'

  typst-worker:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: worker_runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKERHUB_NAMESPACE:-shuhao07}/wangsh-typst-worker:${IMAGE_TAG:-1.4.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      <<: *depends-infra
      backend:
        condition: service_healthy
    environment:
      <<: *common-env
      PYTHONPATH: "/app"
      TYPST_COMPILE_MAX_CONCURRENCY: ${TYPST_COMPILE_MAX_CONCURRENCY:-2}
      TYPST_COMPILE_USE_CELERY: "true"
      TYPST_PDF_STORAGE_DIR: "/app/data/typst_pdfs"
      TYPST_STORE_PDF_IN_DB: "false"
    command: [ "sh", "-c", "celery -A app.celery_app:celery worker -l INFO -Q typst -c ${TYPST_WORKER_CONCURRENCY:-1}" ]
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.celery_app:celery inspect ping -d celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wangsh-network
    volumes:
      - typst_pdfs:/app/data/typst_pdfs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  pythonlab-worker:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: pythonlab_worker_runtime
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKERHUB_NAMESPACE:-shuhao07}/wangsh-pythonlab-worker:${IMAGE_TAG:-1.4.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      <<: *depends-infra
      backend:
        condition: service_healthy
    environment:
      <<: *common-with-pythonlab-env
      PYTHONPATH: "/app"
    user: "0:0"
    command: [ "sh", "-c", "celery -A app.celery_app:celery worker -l INFO -Q celery -c ${PYTHONLAB_WORKER_CONCURRENCY:-3} --include app.tasks.pythonlab" ]
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.celery_app:celery inspect ping -d celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wangsh-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/pythonlab/workspaces:/tmp/pythonlab/workspaces
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  pythonlab-sandbox:
    platform: linux/amd64
    build:
      context: ./backend/docker/pythonlab-sandbox
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: ${PYTHONLAB_SANDBOX_IMAGE:-shuhao07/pythonlab-sandbox:py311}
    restart: unless-stopped
    command: [ "sh", "-lc", "sleep infinity" ]
    networks:
      - wangsh-network
    deploy:
      resources:
        limits:
          memory: 32M

  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_VERSION: ${REACT_APP_VERSION:-}
        NODE_IMAGE: ${NODE_IMAGE:-public.ecr.aws/docker/library/node:20-alpine}
        CADDY_IMAGE: ${CADDY_IMAGE:-public.ecr.aws/docker/library/caddy:2-alpine}
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKERHUB_NAMESPACE:-shuhao07}/wangsh-frontend:${IMAGE_TAG:-1.4.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,wangsh-redis,backend"
    networks:
      - wangsh-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  gateway:
    platform: linux/amd64
    build: ./gateway
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKERHUB_NAMESPACE:-shuhao07}/wangsh-gateway:${IMAGE_TAG:-1.4.0}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${WEB_PORT:-6608}:80"
    environment:
      TZ: ${TIMEZONE:-Asia/Shanghai}
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,postgres,redis,wangsh-redis,backend,frontend"
    depends_on:
      - frontend
      - backend
    networks:
      - wangsh-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  wangsh-network:
    driver: bridge
  dify_network:
    external: true
    name: docker_default

volumes:
  postgres_data:
  redis_data:
  typst_pdfs:
  uploads_data:
