name: pr-pythonlab-phasec-gate

on:
  pull_request:
    paths:
      - "backend/app/api/pythonlab/**"
      - "backend/app/api/endpoints/debug/**"
      - "backend/app/api/v2/pythonlab/**"
      - "backend/app/tasks/pythonlab.py"
      - "backend/app/celery_app.py"
      - "backend/app/core/celery_app.py"
      - "backend/app/core/config/**"
      - "backend/app/core/deps.py"
      - "backend/app/core/sandbox/**"
      - "backend/app/core/startup.py"
      - "backend/app/db/**"
      - "backend/app/services/auth.py"
      - "backend/app/utils/cache.py"
      - "backend/Dockerfile.dev"
      - "backend/docker/pythonlab-sandbox/**"
      - "backend/requirements*.txt"
      - "backend/scripts/smoke_pythonlab_print_visibility_probe.py"
      - "backend/scripts/soak_pythonlab_phasec.py"
      - "frontend/src/lib/monacoSetup.ts"
      - "frontend/src/lib/monacoWorkers.ts"
      - "frontend/src/pages/Admin/ITTechnology/pythonLab/**"
      - "frontend/src/pages/ITTechnology/PythonLab.tsx"
      - "frontend/scripts/pythonlab-debug-smoke.mjs"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/vite.config.*"
      - "scripts/prod-smoke/**"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/pythonlab-phasec-gate.yml"
      - ".github/workflows/pythonlab-pr-runtime.yml"
      - ".github/workflows/pr-pythonlab-phasec-gate.yml"
  workflow_dispatch:

jobs:
  phasec-pr-gate:
    uses: ./.github/workflows/pythonlab-pr-runtime.yml
    with:
      mode: phasec
      rounds: ${{ vars.PYTHONLAB_PHASEC_PR_ROUNDS || '5' }}
      timeout_seconds: ${{ vars.PYTHONLAB_TIMEOUT_SECONDS || '20' }}
