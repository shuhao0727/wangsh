name: markdown-quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/check-markdown-contracts.mjs"
      - "scripts/markdown-contracts.test.mjs"
      - ".github/workflows/markdown-quality.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "scripts/check-markdown-contracts.mjs"
      - "scripts/markdown-contracts.test.mjs"
      - ".github/workflows/markdown-quality.yml"

permissions:
  contents: read

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Markdown contracts
        run: node --test scripts/markdown-contracts.test.mjs
