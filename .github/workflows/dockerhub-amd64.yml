name: dockerhub-amd64

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: image tag
        required: true
        default: "1.6.0"
      push_latest:
        description: also push latest
        required: true
        default: "false"

concurrency:
  group: dockerhub-amd64-release
  cancel-in-progress: false

jobs:
  source-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: require current main source
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
            echo "Docker Hub release publishing is only allowed from main."
            exit 1
          }
          git fetch --no-tags origin main
          [[ "$(git rev-parse HEAD)" == "$(git rev-parse origin/main)" ]] || {
            echo "Checked-out commit is not the current origin/main commit."
            exit 1
          }

  quality-gate:
    needs: source-guard
    uses: ./.github/workflows/ci-quality.yml

  build-and-push:
    needs: quality-gate
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.image_tag }}
      STAGING_TAG: ${{ inputs.image_tag }}-build-${{ github.run_id }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: validate image tag against source version
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "image_tag must be a version-like tag, got: $RELEASE_TAG"
            exit 1
          fi
          expected="$(node -p "require('./frontend/package.json').version")"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "image_tag must match source version: expected=$expected actual=$RELEASE_TAG"
            exit 1
          fi
          node scripts/check-version-consistency.mjs

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          target: backend_runtime
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/shuhao07/wangsh-backend:${{ env.STAGING_TAG }}

      - name: build typst-worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          target: worker_runtime
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/shuhao07/wangsh-typst-worker:${{ env.STAGING_TAG }}

      - name: build pythonlab-worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          target: pythonlab_worker_runtime
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/shuhao07/wangsh-pythonlab-worker:${{ env.STAGING_TAG }}

      - name: build pythonlab-sandbox
        uses: docker/build-push-action@v6
        with:
          context: ./backend/docker/pythonlab-sandbox
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/shuhao07/pythonlab-sandbox:${{ env.STAGING_TAG }}

      - name: build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          target: production
          platforms: linux/amd64
          push: true
          build-args: |
            REACT_APP_VERSION=${{ env.RELEASE_TAG }}
          tags: |
            docker.io/shuhao07/wangsh-frontend:${{ env.STAGING_TAG }}

      - name: build gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/shuhao07/wangsh-gateway:${{ env.STAGING_TAG }}

      - name: verify staging release set
        run: |
          images=(
            wangsh-backend
            wangsh-typst-worker
            wangsh-pythonlab-worker
            pythonlab-sandbox
            wangsh-frontend
            wangsh-gateway
          )
          for image in "${images[@]}"; do
            docker buildx imagetools inspect "docker.io/shuhao07/${image}:${STAGING_TAG}" >/dev/null
          done

      - name: promote version tags after all builds
        run: |
          images=(
            wangsh-backend
            wangsh-typst-worker
            wangsh-pythonlab-worker
            pythonlab-sandbox
            wangsh-frontend
            wangsh-gateway
          )
          for image in "${images[@]}"; do
            docker buildx imagetools create \
              -t "docker.io/shuhao07/${image}:${RELEASE_TAG}" \
              "docker.io/shuhao07/${image}:${STAGING_TAG}"
          done

      - name: verify promoted release set
        run: |
          images=(
            wangsh-backend
            wangsh-typst-worker
            wangsh-pythonlab-worker
            pythonlab-sandbox
            wangsh-frontend
            wangsh-gateway
          )
          manifest_digest() {
            local ref="$1"
            docker buildx imagetools inspect "$ref" \
              | awk '$1 == "Digest:" && $2 ~ /^sha256:[0-9a-fA-F]{64}$/ { print $2; exit }'
          }

          : > release-set.txt
          printf 'format=wangsh-release-set-v1\nversion=%s\n' "$RELEASE_TAG" >> release-set.txt
          for image in "${images[@]}"; do
            staging_ref="docker.io/shuhao07/${image}:${STAGING_TAG}"
            release_ref="shuhao07/${image}:${RELEASE_TAG}"
            staging_digest="$(manifest_digest "$staging_ref")"
            release_digest="$(manifest_digest "$release_ref")"
            if [ -z "$staging_digest" ] || [ -z "$release_digest" ]; then
              echo "missing manifest digest for $image"
              exit 1
            fi
            if [ "$staging_digest" != "$release_digest" ]; then
              echo "promoted digest mismatch for $image"
              exit 1
            fi
            printf 'image=%s ref=%s digest=%s\n' "$image" "$release_ref" "$release_digest" >> release-set.txt
          done
          cat release-set.txt

      - name: upload verified release set
        uses: actions/upload-artifact@v4
        with:
          name: release-set-${{ github.run_id }}
          path: release-set.txt
          if-no-files-found: error

      - name: push latest tags
        if: ${{ inputs.push_latest == 'true' }}
        run: |
          images=(
            wangsh-backend
            wangsh-typst-worker
            wangsh-pythonlab-worker
            pythonlab-sandbox
            wangsh-frontend
            wangsh-gateway
          )
          for image in "${images[@]}"; do
            docker buildx imagetools create \
              -t "docker.io/shuhao07/${image}:latest" \
              "docker.io/shuhao07/${image}:${RELEASE_TAG}"
          done
