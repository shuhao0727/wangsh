<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF.js配置验证</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>PDF.js配置验证</h1>
    <p>验证PDF.js在生产环境下的配置是否正确</p>

    <div class="test-section">
        <h2>验证步骤</h2>
        <ol>
            <li>检查PDF worker文件路径</li>
            <li>验证PDF.js workerSrc配置</li>
            <li>测试PDF加载功能</li>
        </ol>
        <button onclick="runVerification()">开始验证</button>
    </div>

    <div class="test-section">
        <h2>验证结果</h2>
        <div id="verification-result" class="result">点击"开始验证"按钮查看结果</div>
    </div>

    <script>
        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('verification-result');
            resultDiv.textContent = message;
            resultDiv.className = 'result ' + (isSuccess ? 'success' : 'error');
        }

        async function runVerification() {
            showResult('验证进行中...', true);

            try {
                console.log('=== 开始PDF.js配置验证 ===');

                // 步骤1: 检查PDF worker文件
                console.log('1. 检查PDF worker文件...');
                const workerUrl = '/assets/pdf.worker.js';
                console.log('检查URL:', workerUrl);

                // 步骤2: 配置PDF.js
                console.log('2. 配置PDF.js...');

                // 判断环境
                const isProduction = window.location.hostname !== 'localhost' &&
                                    window.location.hostname !== '127.0.0.1' &&
                                    window.location.protocol !== 'file:';

                let workerSrc;
                if (isProduction) {
                    workerSrc = '/assets/pdf.worker.js';
                } else {
                    workerSrc = '/node_modules/pdfjs-dist/build/pdf.worker.js';
                }

                console.log('环境:', isProduction ? '生产环境' : '开发环境');
                console.log('workerSrc:', workerSrc);

                // 步骤3: 导入并配置PDF.js
                console.log('3. 导入pdfjs-dist...');
                const pdfjs = await import('pdfjs-dist/build/pdf');

                // 设置workerSrc
                pdfjs.GlobalWorkerOptions.workerSrc = workerSrc;
                console.log('PDF.js配置成功');
                console.log('GlobalWorkerOptions.workerSrc:', pdfjs.GlobalWorkerOptions.workerSrc);

                // 验证配置
                if (!pdfjs.GlobalWorkerOptions.workerSrc) {
                    throw new Error('workerSrc未设置');
                }

                if (pdfjs.GlobalWorkerOptions.workerSrc !== workerSrc) {
                    throw new Error(`workerSrc不匹配: 期望 ${workerSrc}, 实际 ${pdfjs.GlobalWorkerOptions.workerSrc}`);
                }

                // 步骤4: 测试PDF加载
                console.log('4. 测试PDF加载...');

                // 创建一个最小的PDF数据
                const pdfData = new Uint8Array([
                    0x25, 0x50, 0x44, 0x46, 0x2D, 0x31, 0x2E, 0x34, 0x0A, 0x25, 0xE2, 0xE3, 0xCF, 0xD3, 0x0A,
                    0x31, 0x20, 0x30, 0x20, 0x6F, 0x62, 0x6A, 0x0A, 0x3C, 0x3C, 0x2F, 0x54, 0x79, 0x70, 0x65,
                    0x2F, 0x43, 0x61, 0x74, 0x61, 0x6C, 0x6F, 0x67, 0x2F, 0x50, 0x61, 0x67, 0x65, 0x73, 0x20,
                    0x32, 0x20, 0x30, 0x20, 0x52, 0x3E, 0x3E, 0x0A, 0x65, 0x6E, 0x64, 0x6F, 0x62, 0x6A, 0x0A,
                    0x32, 0x20, 0x30, 0x20, 0x6F, 0x62, 0x6A, 0x0A, 0x3C, 0x3C, 0x2F, 0x54, 0x79, 0x70, 0x65,
                    0x2F, 0x50, 0x61, 0x67, 0x65, 0x73, 0x2F, 0x43, 0x6F, 0x75, 0x6E, 0x74, 0x20, 0x31, 0x3E,
                    0x3E, 0x0A, 0x65, 0x6E, 0x64, 0x6F, 0x62, 0x6A, 0x0A, 0x78, 0x72, 0x65, 0x66, 0x0A, 0x30,
                    0x20, 0x32, 0x0A, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x20, 0x36,
                    0x35, 0x35, 0x33, 0x35, 0x20, 0x66, 0x0A, 0x0A, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30,
                    0x30, 0x30, 0x30, 0x20, 0x30, 0x30, 0x30, 0x30, 0x30, 0x20, 0x6E, 0x0A, 0x0A, 0x74, 0x72,
                    0x61, 0x69, 0x6C, 0x65, 0x72, 0x0A, 0x3C, 0x3C, 0x2F, 0x53, 0x69, 0x7A, 0x65, 0x20, 0x32,
                    0x2F, 0x52, 0x6F, 0x6F, 0x74, 0x20, 0x31, 0x20, 0x30, 0x20, 0x52, 0x3E, 0x3E, 0x0A, 0x73,
                    0x74, 0x61, 0x72, 0x74, 0x78, 0x72, 0x65, 0x66, 0x0A, 0x31, 0x30, 0x34, 0x0A, 0x25, 0x25,
                    0x45, 0x4F, 0x46, 0x0A
                ]);

                const loadingTask = pdfjs.getDocument({ data: pdfData });
                const pdf = await loadingTask.promise;

                console.log('PDF加载成功，页数:', pdf.numPages);

                // 验证完成
                const successMessage = `✅ PDF.js配置验证成功！

配置详情:
• 环境: ${isProduction ? '生产环境' : '开发环境'}
• workerSrc: ${workerSrc}
• PDF加载测试: 成功 (${pdf.numPages}页)

修复总结:
1. ✅ PDF worker文件路径正确配置
2. ✅ PDF.js workerSrc已正确设置
3. ✅ PDF加载功能正常工作

原始错误"GlobalWorkerOptions.workerSrc not specified"已修复。`;

                showResult(successMessage, true);
                console.log('=== 验证完成 ===');

            } catch (error) {
                console.error('验证失败:', error);

                const errorMessage = `❌ PDF.js配置验证失败

错误详情: ${error.message}

问题分析:
1. PDF worker文件可能未正确复制到构建目录
2. PDF.js配置可能未正确应用
3. 网络请求可能存在问题

建议检查:
• 确认 build/assets/pdf.worker.js 文件存在
• 检查 vite.config.ts 中的 copy-pdf-worker 插件
• 验证 PDF.js 版本兼容性`;

                showResult(errorMessage, false);
            }
        }
    </script>
</body>
</html>
