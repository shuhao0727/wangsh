<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF加载测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>PDF加载测试</h1>

    <div class="test-section">
        <h2>测试1: 检查PDF worker文件是否存在</h2>
        <button onclick="testWorkerFile()">测试PDF worker文件</button>
        <div id="worker-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>测试2: 检查PDF.js配置</h2>
        <button onclick="testPdfJsConfig()">测试PDF.js配置</button>
        <div id="config-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>测试3: 加载示例PDF</h2>
        <button onclick="loadSamplePdf()">加载示例PDF</button>
        <div id="pdf-result" class="result"></div>
        <div id="pdf-canvas" style="margin-top: 20px;"></div>
    </div>

    <script>
        function showResult(elementId, message, isSuccess) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'result ' + (isSuccess ? 'success' : 'error');
        }

        async function testWorkerFile() {
            try {
                const response = await fetch('/assets/pdf.worker.js');
                if (response.ok) {
                    showResult('worker-result', '✅ PDF worker文件存在且可访问', true);
                } else {
                    showResult('worker-result', `❌ PDF worker文件不可访问: ${response.status} ${response.statusText}`, false);
                }
            } catch (error) {
                showResult('worker-result', `❌ 无法访问PDF worker文件: ${error.message}`, false);
            }
        }

        async function testPdfJsConfig() {
            try {
                // 动态导入pdfInit模块
                const module = await import('./src/utils/pdfInit.ts');
                const { configurePdfJs } = module;

                await configurePdfJs();

                // 检查配置
                const pdfjs = await import('pdfjs-dist/build/pdf');
                const workerSrc = pdfjs.GlobalWorkerOptions.workerSrc;

                showResult('config-result', `✅ PDF.js配置成功\nworkerSrc: ${workerSrc}`, true);
            } catch (error) {
                showResult('config-result', `❌ PDF.js配置失败: ${error.message}`, false);
            }
        }

        async function loadSamplePdf() {
            try {
                // 创建一个简单的PDF文件进行测试
                const pdfData = new Uint8Array([
                    0x25, 0x50, 0x44, 0x46, 0x2D, 0x31, 0x2E, 0x34, 0x0A, 0x25, 0xE2, 0xE3, 0xCF, 0xD3, 0x0A,
                    0x31, 0x20, 0x30, 0x20, 0x6F, 0x62, 0x6A, 0x0A, 0x3C, 0x3C, 0x2F, 0x54, 0x79, 0x70, 0x65,
                    0x2F, 0x43, 0x61, 0x74, 0x61, 0x6C, 0x6F, 0x67, 0x2F, 0x50, 0x61, 0x67, 0x65, 0x73, 0x20,
                    0x32, 0x20, 0x30, 0x20, 0x52, 0x3E, 0x3E, 0x0A, 0x65, 0x6E, 0x64, 0x6F, 0x62, 0x6A, 0x0A,
                    0x32, 0x20, 0x30, 0x20, 0x6F, 0x62, 0x6A, 0x0A, 0x3C, 0x3C, 0x2F, 0x54, 0x79, 0x70, 0x65,
                    0x2F, 0x50, 0x61, 0x67, 0x65, 0x73, 0x2F, 0x43, 0x6F, 0x75, 0x6E, 0x74, 0x20, 0x31, 0x3E,
                    0x3E, 0x0A, 0x65, 0x6E, 0x64, 0x6F, 0x62, 0x6A, 0x0A, 0x78, 0x72, 0x65, 0x66, 0x0A, 0x30,
                    0x20, 0x32, 0x0A, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x20, 0x36,
                    0x35, 0x35, 0x33, 0x35, 0x20, 0x66, 0x0A, 0x0A, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30, 0x30,
                    0x30, 0x30, 0x30, 0x20, 0x30, 0x30, 0x30, 0x30, 0x30, 0x20, 0x6E, 0x0A, 0x0A, 0x74, 0x72,
                    0x61, 0x69, 0x6C, 0x65, 0x72, 0x0A, 0x3C, 0x3C, 0x2F, 0x53, 0x69, 0x7A, 0x65, 0x20, 0x32,
                    0x2F, 0x52, 0x6F, 0x6F, 0x74, 0x20, 0x31, 0x20, 0x30, 0x20, 0x52, 0x3E, 0x3E, 0x0A, 0x73,
                    0x74, 0x61, 0x72, 0x74, 0x78, 0x72, 0x65, 0x66, 0x0A, 0x31, 0x30, 0x34, 0x0A, 0x25, 0x25,
                    0x45, 0x4F, 0x46, 0x0A
                ]);

                // 配置PDF.js
                const module = await import('./src/utils/pdfInit.ts');
                const { getPdfJs } = module;
                const pdfjs = await getPdfJs();

                // 加载PDF
                const loadingTask = pdfjs.getDocument({ data: pdfData });
                const pdf = await loadingTask.promise;

                showResult('pdf-result', `✅ PDF加载成功\n页数: ${pdf.numPages}`, true);

                // 渲染第一页
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1.0 });

                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.style.border = '1px solid #ccc';

                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport }).promise;

                document.getElementById('pdf-canvas').appendChild(canvas);

            } catch (error) {
                showResult('pdf-result', `❌ PDF加载失败: ${error.message}`, false);
                console.error('PDF加载错误:', error);
            }
        }
    </script>
</body>
</html>
