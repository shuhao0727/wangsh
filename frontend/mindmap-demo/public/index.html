<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0" />
    <link rel="icon" href="logo.ico" />
    <title>思绪思维导图</title>
    <script>
      window.externalPublicPath = '/mindmap-demo/'
      localStorage.setItem('webUseTip', '1')
      window.takeOverApp = true
      window._wangsh_readonly = new URLSearchParams(location.search).get('readonly') === '1'
    </script>
  </head>
  <body>
    <noscript><strong>We're sorry but thoughts doesn't work properly without JavaScript enabled. Please enable it to continue.</strong></noscript>
    <div id="app"></div>
    <!-- 保存到服务器的浮动按钮（仅编辑模式显示） -->
    <div id="ws-save-btn" style="position:fixed;top:10px;right:20px;z-index:9999;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:none;transition:all 0.3s">💾 保存到服务器</div>
    <script>var sp= new URLSearchParams(location.search), isReadonly = sp.get('readonly') === '1'; document.getElementById('ws-save-btn').onclick=function(){var b=this;if(window._mmData&&!isReadonly){var r=window._mmData.root||window._mmData;function t(n,l){l=l||1;var m='#'.repeat(l)+' '+(n.data?n.data.text:'');if(n.children)for(var i=0;i<n.children.length;i++)m+='\n'+t(n.children[i],l+1);return m}var mk=t(r),id=sp.get('id'),tk=localStorage.getItem('ws_access_token')||sessionStorage.getItem('ws_access_token'),h={'Content-Type':'application/json'};if(tk)h['Authorization']='Bearer '+tk;b.textContent='保存中...';b.style.background='#9ca3af';fetch('/api/v1/learning/mindmaps/'+id,{method:'PUT',headers:h,credentials:'include',body:JSON.stringify({title:r.data?r.data.text:'未命名',content:{markdown:mk}})}).then(function(res){b.textContent=res.ok?'✅ 已保存':'❌ 失败('+res.status+')';b.style.background=res.ok?'#10b981':'#ef4444';setTimeout(function(){b.textContent='💾 保存到服务器';b.style.background='#3b82f6'},2000)}).catch(function(){b.textContent='❌ 网络错误';b.style.background='#ef4444';setTimeout(function(){b.textContent='💾 保存到服务器';b.style.background='#3b82f6'},2000)})}};</script>
    <!-- built files will be auto injected -->
    <script>
      const getDataFromBackend = () => {
        return new Promise((resolve) => {
          setTimeout(() => {
            // 先从 WangSh localStorage 读取
            try {
              const raw = localStorage.getItem('_wangsh_mindmap_data')
              if (raw) {
                const data = JSON.parse(raw)
                resolve({
                  mindMapData: data,
                  mindMapConfig: window._wangsh_readonly ? { readonly: true } : {},
                  lang: 'zh',
                  localConfig: null
                })
                return
              }
            } catch(e) {}
            // fallback: 默认数据
            resolve({
              mindMapData: {
                root: { data: { text: '中心主题' }, children: [] },
                theme: { template: 'classic4', config: {} },
                layout: 'logicalStructure',
                config: {},
                view: null
              },
              mindMapConfig: {},
              lang: 'zh',
              localConfig: null
            })
          }, 200)
        })
      }
      const mmId = new URLSearchParams(location.search).get('id')
      const setTakeOverAppMethods = data => {
        window.takeOverAppMethods = {}
        window.takeOverAppMethods.getMindMapData = () => data.mindMapData
        window.takeOverAppMethods.saveMindMapData = mindMapData => {
          data.mindMapData = mindMapData
          // 直接调 API 保存
          if (mmId) {
            const root = mindMapData.root || mindMapData
            // 将树结构转为 markdown
            function toMd(node, level) {
              level = level || 1
              var md = '#'.repeat(level) + ' ' + (node.data ? node.data.text : '')
              if (node.children) for (var i = 0; i < node.children.length; i++) md += '\n' + toMd(node.children[i], level + 1)
              return md
            }
            const markdown = toMd(root)
            const token = localStorage.getItem('ws_access_token') || sessionStorage.getItem('ws_access_token')
            const h = { 'Content-Type': 'application/json' }
            if (token) h['Authorization'] = 'Bearer ' + token
            fetch('/api/v1/learning/mindmaps/' + mmId, {
              method: 'PUT', headers: h, credentials: 'include',
              body: JSON.stringify({ title: root.data ? root.data.text : '未命名', content: { markdown: markdown } })
            }).catch(function(){})
          }
        }
        window.takeOverAppMethods.getMindMapConfig = () => data.mindMapConfig
        window.takeOverAppMethods.saveMindMapConfig = config => { data.mindMapConfig = config }
        window.takeOverAppMethods.getLanguage = () => data.lang
        window.takeOverAppMethods.saveLanguage = lang => { data.lang = lang }
        window.takeOverAppMethods.getLocalConfig = () => data.localConfig
        window.takeOverAppMethods.saveLocalConfig = config => { data.localConfig = config }
      }
      window.onload = async () => {
        if (!window.takeOverApp) return
        const data = await getDataFromBackend()
        setTakeOverAppMethods(data)
        window.$bus.$on('app_inited', mindMap => { console.log('mindmap ready'); if (!window._wangsh_readonly) document.getElementById('ws-save-btn').style.display='block' })
        window.initApp()
      }
    </script>
  </body>
</html>
